name: CI & CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build Docker Image
        run: docker compose build

      - name: Push to DockerHub
        run: docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup SSH Key & Deploy
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $EC2_USERNAME@$EC2_HOST << EOF
            sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            sudo docker rm -f zenova-api || true
            sudo docker rmi -f moinaknaskar/zenova:latest || true
            sudo docker system prune -f || true
            sudo docker pull moinaknaskar/zenova:latest
            sudo docker run -d \
              -p 8000:8000 \
              --name zenova-api \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -e NODE_ENV="production" \
              -e APP_NAME="Zenova" \
              -e HOST="localhost" \
              -e PORT=8000 \
              -e DATABASE_URI="${{ secrets.DATABASE_URI }}" \
              -e JWT_ACCESS_TOKEN_SECRET_PRIVATE="${{ secrets.JWT_ACCESS_TOKEN_SECRET_PRIVATE }}" \
              -e JWT_ACCESS_TOKEN_SECRET_PUBLIC="${{ secrets.JWT_ACCESS_TOKEN_SECRET_PUBLIC }}" \
              -e JWT_ACCESS_TOKEN_EXPIRATION_DAYS=1 \
              -e REFRESH_TOKEN_EXPIRATION_DAYS=750 \
              -e VERIFY_EMAIL_TOKEN_EXPIRATION_MINUTES=1440 \
              -e RESET_PASSWORD_TOKEN_EXPIRATION_MINUTES=10080 \
              -e SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              -e SMTP_HOST="smtp.gmail.com" \
              -e SMTP_PORT=587 \
              -e EMAIL_FROM="wondercreativestudio@gmail.com" \
              -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              -e ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}" \
              -e FCM_SERVER_KEY="${{ secrets.FCM_SERVER_KEY }}" \
              -e FCM_PROJECT_ID="${{ secrets.FCM_PROJECT_ID }}" \
              -e FCM_CLIENT_EMAIL="${{ secrets.FCM_CLIENT_EMAIL }}" \
              -e FCM_PRIVATE_KEY='${{ secrets.FCM_PRIVATE_KEY }}' \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              -e CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
              -e CLOUDINARY_UPLOAD_PRESET="edu_stack" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e APPLE_CLIENT_ID="${{ secrets.APPLE_CLIENT_ID }}" \
              -e APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}" \
              -e APPLE_KEY_ID="${{ secrets.APPLE_KEY_ID }}" \
              -e USDA_API_KEY="${{ secrets.USDA_API_KEY }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e VECTOR_DB_URL="${{ secrets.VECTOR_DB_URL }}" \
              -e VECTOR_DB_API_KEY="${{ secrets.VECTOR_DB_API_KEY }}" \
              -e VECTOR_DB_PROVIDER="${{ secrets.VECTOR_DB_PROVIDER }}" \
              moinaknaskar/zenova:latest
          EOF
