name: CI & CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Login Dockerhub
      env:
        DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      
    - name: Build the Docker image
      run: docker compose build 
    - name: Push to Dockerhub
      run: docker compose push

  deploy:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to EC2 via SSH
      env:
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      run: |
        echo "$EC2_SSH_KEY" > /tmp/ssh_key.pem
        chmod 600 /tmp/ssh_key.pem
        ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key.pem $EC2_USERNAME@$EC2_HOST << 'EOF'
          sudo docker rm -f zenova-api || true
          sudo docker rmi -f moinaknaskar/zenova:latest || true
          sudo docker system prune -f || true
          sudo docker pull moinaknaskar/zenova:latest
          sudo docker run -d -p 8000:8000 --name zenova-api moinaknaskar/zenova
        EOF
        rm -f /tmp/ssh_key.pem
