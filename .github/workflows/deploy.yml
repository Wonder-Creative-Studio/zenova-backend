name: CI & CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Login Dockerhub
      env:
        DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      
    - name: Build the Docker image
      run: docker compose build 
    - name: Push to Dockerhub
      run: docker compose push

  deploy:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Debug - Check SSH key loaded
      run: |
        echo "Key length: ${#SSH_KEY}"
        echo "Host: $EC2_HOST"
        echo "Username: $EC2_USERNAME"
      env:
        SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker rm -f zenova-api || true
          sudo docker rmi -f moinaknaskar/zenova:latest || true
          sudo docker system prune -f || true
          sudo docker pull moinaknaskar/zenova:latest
          sudo docker run -d -p 8000:8000 --name zenova-api moinaknaskar/zenova
